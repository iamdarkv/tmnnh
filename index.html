<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Gửi Chị Ánh 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #363636; /* Đổi màu nền tối một chút để giống ảnh của bạn, hoặc bạn đổi thành #fdf2f8 nếu thích màu hồng */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        /* CONTAINER CHÍNH CỦA PHONG THƯ */
        .envelope-wrapper {
            position: relative;
            width: 700px;   
            height: 450px;  
            max-width: 95vw; 
            cursor: pointer;
            perspective: 1200px;
            transition: transform 1s ease;
        }

        .envelope-wrapper.open {
            transform: translateY(120px);
        }

        /* Mặt sau phong thư */
        .envelope-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #d1788e;
            border-radius: 12px;
            z-index: 0;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        /* Mặt trước phong thư (Túi đựng) */
        .pocket {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f497b0;
            border-radius: 12px;
            clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
            z-index: 3;
        }

        /* Nắp phong thư */
        .flap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f9a8be;
            border-radius: 12px;
            clip-path: polygon(0 0, 100% 0, 50% 55%);
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4;
        }

        /* BỨC THƯ BÊN TRONG */
        .letter {
            position: absolute;
            top: 15px; 
            left: 50%;
            transform: translateX(-50%);
            width: 94%;       
            height: 100%;    
            background-color: #2b2b2b; /* Màu giấy tối giống nền tin nhắn */
            border-radius: 12px;
            z-index: 1;       
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #f497b0 transparent;
        }

        .letter::-webkit-scrollbar { width: 6px; }
        .letter::-webkit-scrollbar-track { background: transparent; }
        .letter::-webkit-scrollbar-thumb { background-color: #f497b0; border-radius: 10px; }

        /* VĂN BẢN THƯ */
        .text-content {
            text-align: left;
            margin-bottom: 20px;
        }

        .letter p {
            font-size: 32px; /* Chữ to rõ như ảnh */
            color: #ffffff; /* Chữ màu trắng */
            line-height: 1.5;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* DANH SÁCH EMOJI */
        .emoji-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .emoji-row {
            font-size: 30px; 
            white-space: nowrap; 
            letter-spacing: 2px;
        }

        /* STICKER GẤU PANDA */
        .sticker-container {
            align-self: center; 
            width: 250px; 
            margin-top: 30px;
            margin-bottom: 20px;
            position: relative;
        }

        .panda-sticker {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4)); /* Thêm chút bóng cho sticker nổi bật */
        }

        /* --- HIỆU ỨNG ANIMATION KHI MỞ THƯ --- */
        
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* Thư bay ra ngoài và đè lên mặt trước */
        .envelope-wrapper.open .letter {
            animation: letterFlyOut 2s ease-in-out forwards;
            animation-delay: 0.3s;
        }

        @keyframes letterFlyOut {
            0% { transform: translate(-50%, 0); z-index: 1; }
            40% { transform: translate(-50%, -105%); z-index: 1; }
            45% { transform: translate(-50%, -105%); z-index: 5; }
            100% { transform: translate(-50%, -40px); z-index: 5; }
        }

        /* Gợi ý click */
        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #f9a8be;
            font-size: 20px;
            font-weight: 700;
            transition: opacity 0.3s;
        }

        .envelope-wrapper.open .hint {
            opacity: 0;
        }

        /* Responsive cho điện thoại */
        @media (max-width: 768px) {
            .envelope-wrapper { height: 400px; }
            .letter p { font-size: 24px; }
            .emoji-row { font-size: 24px; }
            .sticker-container { width: 180px; }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope">
        <div class="envelope-back"></div>
        
        <div class="letter">
            <div class="text-content">
                <p>chị Ánh oyyy t7 CN tới<br>chị về THNB cùng với<br>tụi em nhóooo</p>
                <div class="emoji-rows">
                    <div class="emoji-row">😳💋❤️</div>
                    <div class="emoji-row">🩷❤️🧡💛💚🩵💙💜</div>
                    <div class="emoji-row">🤍❣️✨💘💖💓💗💞</div>
                    <div class="emoji-row">🫣🥳🥰🥰🥰</div>
                </div>
            </div>

            <div class="sticker-container">
                <img src="https://github.com/iamdarkv/tmnnh/blob/63dbc13873ea5bcc45691bfa8fbf5977d77f2e8b/panda_no_bg.png" alt="Sticker Gấu Panda Muah" class="panda-sticker">
            </div>
        </div>

        <div class="pocket"></div>
        <div class="flap"></div>
        <div class="hint">Click vào phong thư để mở 💌</div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        
        envelope.addEventListener('click', () => {
            // Dùng toggle để cho phép click mở ra và click lần nữa để thu vào
            envelope.classList.toggle('open');
        });
    </script>

</body>
</html>
