<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Gửi Chị Ánh 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fdf2f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            overflow: hidden; /* Ngăn trang web bị cuộn dính */
        }

        /* CONTAINER CHÍNH CỦA PHONG THƯ (KÍCH THƯỚC LỚN) */
        .envelope-wrapper {
            position: relative;
            width: 700px;   /* Kích thước lớn trên máy tính */
            height: 450px;  /* Kích thước lớn trên máy tính */
            max-width: 95vw; /* Tự động thu nhỏ trên điện thoại */
            cursor: pointer;
            perspective: 1200px;
            transition: transform 1s ease;
        }

        /* Khi click mở, đẩy toàn bộ phong thư xuống dưới một chút */
        .envelope-wrapper.open {
            transform: translateY(120px);
            cursor: default;
        }

        /* Mặt sau phong thư */
        .envelope-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #d1788e;
            border-radius: 12px;
            z-index: 0;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        /* Mặt trước phong thư (Túi đựng) */
        .pocket {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f497b0;
            border-radius: 12px;
            clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
            z-index: 3;
        }

        /* Nắp phong thư */
        .flap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f9a8be;
            border-radius: 12px;
            clip-path: polygon(0 0, 100% 0, 50% 55%);
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4;
        }

        /* BỨC THƯ (KÍCH THƯỚC LỚN VÀ THÊM THANH CUỘN) */
        .letter {
            position: absolute;
            top: 15px; 
            left: 50%;
            transform: translateX(-50%);
            width: 94%;       
            height: 100%;    /* Dài hết phong thư */
            background-color: #fffcf8;
            border-radius: 8px;
            z-index: 1;       
            padding: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Để sticker ở dưới cùng */
            
            /* Cho phép cuộn nếu chữ quá dài */
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #f497b0 transparent;
        }

        /* Tùy chỉnh thanh cuộn đẹp mắt */
        .letter::-webkit-scrollbar { width: 6px; }
        .letter::-webkit-scrollbar-track { background: transparent; }
        .letter::-webkit-scrollbar-thumb { background-color: #f497b0; border-radius: 10px; }

        /* VĂN BẢN THƯ CĂN TRÁI */
        .text-content {
            text-align: left;
            margin-bottom: 20px;
        }

        .letter p {
            font-size: 24px; /* Chữ to rõ ràng */
            color: #444;
            line-height: 1.6;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* DANH SÁCH EMOJI CĂN TRÁI */
        .emoji-rows {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .emoji-row {
            font-size: 20px; /* Chữ to rõ ràng cho emoji */
            white-space: nowrap; /* Giữ emoji trên một dòng */
        }

        /* STICKER GẤU PANDA CĂN GIỮA Ở DƯỚI */
        .sticker-container {
            align-self: center; /* Căn giữa sticker */
            width: 250px; /* Kích thước sticker */
            height: auto;
            margin-top: 20px;
            position: relative;
        }

        .panda-sticker {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- XỬ LÝ ANIMATION KHI MỞ THƯ --- */
        
        /* 1. Mở nắp */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* 2. Bức thư bay ra ngoài và đè lên phong thư */
        .envelope-wrapper.open .letter {
            animation: letterFlyOut 2.2s ease-in-out forwards;
            animation-delay: 0.3s;
        }

        @keyframes letterFlyOut {
            0% {
                transform: translate(-50%, 0);
                z-index: 1;
            }
            40% {
                transform: translate(-50%, -105%); 
                z-index: 1;
            }
            45% {
                transform: translate(-50%, -105%);
                z-index: 5; /* Đổi z-index để thư nhảy lên trên */
            }
            100% {
                transform: translate(-50%, -50px); /* Hạ thư xuống nhưng vẫn ở trên túi */
                z-index: 5;
            }
        }

        /* Gợi ý click */
        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #d84370;
            font-size: 18px;
            font-weight: 600;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .envelope-wrapper.open .hint {
            opacity: 0;
        }
    </style>
</head>
<body>

        <div class="envelope-back"></div>
        
        <div class="letter">
            <div class="text-content">
                <p>chị Ánh oyyy t7 CN tới chị về THNB cùng với tụi em nhóooo</p>
                <div class="emoji-rows">
                    <div class="emoji-row">😳💋❤️</div>
                    <div class="emoji-row">🩷❤️🧡💛💚🩵💙💜</div>
                    <div class="emoji-row">🤍❣️✨💘💖💓💗💞</div>
                    <div class="emoji-row">🫣🥳🥰🥰🥰</div>
                </div>
            </div>

            <div class="sticker-container">
                <img src="path/to/panda_sticker.png" alt="Sticker Gấu Panda Muah" class="panda-sticker">
                </div>
        </div>

        <div class="pocket"></div>
        <div class="flap"></div>
        <div class="hint">Click để mở thư 💌</div>
    </div>
